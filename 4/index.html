        <style>
.tabs input[type="radio"] {
    display: none;
}

.tab-buttons {
    display: flex;
}

.tab-buttons label {
    padding: 10px 20px;
    cursor: pointer;
    background: #444;
}

#tab1:checked ~ .tab-buttons label[for="tab1"],
#tab2:checked ~ .tab-buttons label[for="tab2"],
#tab3:checked ~ .tab-buttons label[for="tab3"],
#tab4:checked ~ .tab-buttons label[for="tab4"],
#tab5:checked ~ .tab-buttons label[for="tab5"],
#tab6:checked ~ .tab-buttons label[for="tab6"] {
    cursor: default;
    background: #666;
    border-bottom: 2px solid white;
    font-weight: bold;
}

.tab-pane {
    display: none;
}

.tab-buttons label:hover {
    background: #555;
}

#tab1:checked ~ .tab-contents .tab1,
#tab2:checked ~ .tab-contents .tab2,
#tab3:checked ~ .tab-contents .tab3,
#tab4:checked ~ .tab-contents .tab4,
#tab5:checked ~ .tab-contents .tab5,
#tab6:checked ~ .tab-contents .tab6 {
    display: block;
}
        </style>
